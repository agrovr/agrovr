<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 330" role="img" aria-labelledby="roleforge-title roleforge-desc">
  <title id="roleforge-title">RoleForge trajectory engine</title>
  <desc id="roleforge-desc">An observatory-style flight path showing the RoleForge workflow: resume, target role, AI guidance, and export.</desc>
  <defs>
    <pattern id="chart-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#7d6d92" stroke-width="0.65" opacity="0.13"/>
    </pattern>
    <radialGradient id="violet-haze" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#c5afe7" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#c5afe7" stop-opacity="0"/>
    </radialGradient>
    <marker id="route-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5 1 9Z" fill="#df8139"/>
    </marker>
    <filter id="blur" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="920" height="330" fill="#f8f3eb"/>
  <rect width="920" height="330" fill="url(#chart-grid)"/>
  <ellipse cx="557" cy="188" rx="230" ry="126" fill="url(#violet-haze)" filter="url(#blur)"/>
  <path d="M16 40V16h24M880 16h24v24M904 290v24h-24M40 314H16v-24" fill="none" stroke="#5b486e" stroke-width="1.3" opacity="0.58"/>

  <text x="42" y="48" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="760" letter-spacing="-0.4" fill="#271936">ROLEFORGE / TRAJECTORY ENGINE</text>
  <text x="43" y="76" font-family="Georgia, Times New Roman, serif" font-size="17" font-style="italic" fill="#7556a4">from raw experience to a launch-ready application</text>
  <text x="878" y="48" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="1.6" fill="#786989">MISSION 01</text>

  <path d="M111 205C183 205 242 159 316 164S467 221 557 207 708 133 795 153" fill="none" stroke="#b39ccf" stroke-width="8" opacity="0.2"/>
  <path d="M111 205C183 205 242 159 316 164S467 221 557 207 708 133 795 153" fill="none" stroke="#df8139" stroke-width="2.4" marker-end="url(#route-arrow)"/>
  <path d="M111 205C183 205 242 159 316 164S467 221 557 207 708 133 795 153" fill="none" stroke="#6f568b" stroke-width="1" stroke-dasharray="2 10" opacity="0.78"/>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" fill="#281a38">
    <g transform="translate(111 205)">
      <circle r="39" fill="#faf6ef" stroke="#80659e" stroke-width="1.8"/>
      <circle r="51" fill="none" stroke="#80659e" stroke-width="1" stroke-dasharray="2 6" opacity="0.55"/>
      <path d="M-13-18H8l10 10v27h-31Z" fill="none" stroke="#604675" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M8-18v11h10M-5 1H9M-5 9H7" fill="none" stroke="#df8139" stroke-width="2"/>
      <text y="77" text-anchor="middle" font-size="20" font-weight="720">RESUME</text>
      <text y="97" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1.2" fill="#746585">INPUT</text>
    </g>

    <g transform="translate(316 164)">
      <circle r="42" fill="#f5efe8" stroke="#9d7ac6" stroke-width="2"/>
      <circle r="27" fill="none" stroke="#6f568b" stroke-width="1.3"/>
      <circle r="9" fill="none" stroke="#df8139" stroke-width="2.2"/>
      <path d="M0-34v18M0 16v18M-34 0h18M16 0h18" stroke="#6f568b" stroke-width="1.6"/>
      <circle r="3.8" fill="#df8139"/>
      <text y="83" text-anchor="middle" font-size="20" font-weight="720">TARGET ROLE</text>
      <text y="103" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1.2" fill="#746585">ALIGN</text>
    </g>

    <g transform="translate(557 207)">
      <circle r="47" fill="#6f4e93" stroke="#4d3568" stroke-width="2"/>
      <circle r="59" fill="none" stroke="#8e70b4" stroke-width="1" stroke-dasharray="3 7"/>
      <path d="M0-24 6-7 24 0 6 7 0 24-6 7-24 0-6-7Z" fill="#f5b16f"/>
      <circle r="5" fill="#fff8ee"/>
      <text y="87" text-anchor="middle" font-size="20" font-weight="720">AI GUIDANCE</text>
      <text y="107" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1.2" fill="#746585">GENERATE</text>
    </g>

    <g transform="translate(795 153)">
      <circle r="40" fill="#faf6ef" stroke="#d77b37" stroke-width="2"/>
      <ellipse rx="17" ry="26" fill="none" stroke="#604675" stroke-width="2.2" transform="rotate(35)"/>
      <path d="M-19 19 3 10M9-20l9-9M5 23l4 16" stroke="#df8139" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="-2" cy="-3" r="5" fill="#a889cc"/>
      <text y="85" text-anchor="middle" font-size="20" font-weight="720">EXPORT</text>
      <text y="105" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1.2" fill="#746585">SHIP</text>
    </g>
  </g>

  <g fill="#8b79a0" opacity="0.8">
    <circle cx="55" cy="111" r="1.7"/><circle cx="78" cy="129" r="2.2"/><circle cx="850" cy="92" r="1.8"/><circle cx="874" cy="115" r="2.3"/>
    <path d="M55 111 78 129M850 92l24 23" stroke="#8b79a0" stroke-width="1"/>
  </g>
</svg>
