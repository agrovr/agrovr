<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 286" role="img" aria-labelledby="telemetry-title telemetry-desc">
  <title id="telemetry-title">Orbital telemetry</title>
  <desc id="telemetry-desc">Public GitHub telemetry for RoleForge AI and KubeResearch AIQ, showing each repository primary language and latest public push date.</desc>
  <defs>
    <pattern id="telemetry-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#aa8dcb" stroke-width="0.65" opacity="0.11"/>
    </pattern>
  </defs>
  <rect width="920" height="286" fill="#0d0816"/>
  <rect width="920" height="286" fill="url(#telemetry-grid)"/>
  <path d="M16 40V16h24M880 16h24v24M904 246v24h-24M40 270H16v-24" fill="none" stroke="#b89adb" stroke-width="1.3" opacity="0.62"/>
  <text x="42" y="47" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="27" font-weight="760" fill="#f4eefb">ORBITAL TELEMETRY</text>
  <text x="878" y="47" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#c8b8dc">FIRST-PARTY / PUBLIC DATA</text>
  <text x="43" y="72" font-family="Georgia, Times New Roman, serif" font-size="17" font-style="italic" fill="#b895dc">two active systems, observed without third-party widgets</text>
  <g transform="translate(54 92)">
    <rect width="812" height="72" rx="8" fill="#171020" stroke="#b89adb" stroke-width="1.2" opacity="0.98"/>
    <circle cx="34" cy="36" r="15" fill="none" stroke="#f2a45b" stroke-width="2"/>
    <circle cx="34" cy="36" r="5" fill="#f2a45b"/>
    <path d="M34 13V5M34 67v-8M11 36H3M65 36h-8" stroke="#f2a45b" stroke-width="1.4" opacity="0.82"/>
    <text x="68" y="31" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="720" fill="#f4eefb">RoleForge AI</text>
    <text x="68" y="54" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" letter-spacing="1.1" fill="#c8b8dc">PUBLIC MISSION 01</text>
    <text x="506" y="30" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" text-anchor="end" fill="#c8b8dc">PRIMARY SYSTEM</text>
    <text x="506" y="54" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="680" text-anchor="end" fill="#f4eefb">TypeScript</text>
    <text x="778" y="30" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" text-anchor="end" fill="#c8b8dc">LAST PUBLIC PUSH</text>
    <text x="778" y="54" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="680" text-anchor="end" fill="#f4eefb">2026-07-14</text>
  </g>
  <g transform="translate(54 178)">
    <rect width="812" height="72" rx="8" fill="#171020" stroke="#b89adb" stroke-width="1.2" opacity="0.98"/>
    <circle cx="34" cy="36" r="15" fill="none" stroke="#b895dc" stroke-width="2"/>
    <circle cx="34" cy="36" r="5" fill="#b895dc"/>
    <path d="M34 13V5M34 67v-8M11 36H3M65 36h-8" stroke="#b895dc" stroke-width="1.4" opacity="0.82"/>
    <text x="68" y="31" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="720" fill="#f4eefb">KubeResearch AIQ</text>
    <text x="68" y="54" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" letter-spacing="1.1" fill="#c8b8dc">PUBLIC MISSION 02</text>
    <text x="506" y="30" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" text-anchor="end" fill="#c8b8dc">PRIMARY SYSTEM</text>
    <text x="506" y="54" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="680" text-anchor="end" fill="#f4eefb">Python</text>
    <text x="778" y="30" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" text-anchor="end" fill="#c8b8dc">LAST PUBLIC PUSH</text>
    <text x="778" y="54" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="680" text-anchor="end" fill="#f4eefb">2026-04-23</text>
  </g>
</svg>
