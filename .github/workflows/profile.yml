name: Profile atlas

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profile-atlas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out profile
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22

      - name: Verify profile files
        run: node scripts/verify-profile.mjs

  update-telemetry:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Check out the default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22

      - name: Generate public telemetry
        run: node scripts/generate-profile.mjs

      - name: Verify generated profile
        run: node scripts/verify-profile.mjs

      - name: Detect telemetry changes
        id: telemetry
        shell: bash
        run: |
          if git diff --quiet -- assets/orbital-telemetry-light.svg assets/orbital-telemetry-dark.svg; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit telemetry changes
        if: steps.telemetry.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- assets/orbital-telemetry-light.svg assets/orbital-telemetry-dark.svg
          git commit -m "Update orbital telemetry"
          git push origin "HEAD:$DEFAULT_BRANCH"
